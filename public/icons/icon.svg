  <!-- L?neas de d?as (lista) -->
  <line x1="120" y1="200" x2="392" y2="200" stroke="#14b8a6" stroke-width="16" stroke-linecap="round"/>
  <line x1="120" y1="280" x2="392" y2="280" stroke="#14b8a6" stroke-width="16" stroke-linecap="round"/>
  <line x1="120" y1="360" x2="320" y2="360" stroke="#14b8a6" stroke-width="16" stroke-linecap="round"/>
  <!-- S?mbolo de dinero/d?lar en un c?rculo -->
